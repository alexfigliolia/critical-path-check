[package]
name = "critical-path-check"
version = "1.0.1"
edition = "2024"
description = "A compressor for static files producing gzip, brotli, deflate, and zstdandard file variants"
license = "MIT"
readme = "README.md"

[[bin]]
name = "critical-path-check"
path = "internals/main.rs"

[dependencies]
colored = "3.1.1"
futures = "0.3.32"
html-ast = "0.1.0"
htmler = "0.1.1"
lightningcss = "1.0.0-alpha.71"
normalize-path = "0.2.1"
reqwest = "0.13.2"
swc_common = "21.0.1"
swc_ecma_ast = "23.0.0"
swc_ecma_parser = "38.0.1"
tokio = { version = "1.51.1", features = ["full"] }
url = "2.5.8"
