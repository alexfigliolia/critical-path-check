[package]
name = "wasm-lib"
version = "1.0.0"
edition = "2024"
description = "A critical path measurement tool designed for both local and remote builds"
license = "MIT"
readme = "README.md"

[lib]
crate-type = ["cdylib"]
path = "lib.rs"

[dependencies]
critical-path-check = { path = "../core" }
wasm-bindgen = "0.2.118"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
